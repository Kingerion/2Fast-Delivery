<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2Fast Delivery | Γρήγορες Διανομές</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #F8FAFC; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .map-container { height: 250px; width: 100%; border-radius: 12px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .price-box { background: #1E293B; color: white; border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #E2E8F0; }
        .input-field { width: 100%; padding: 12px; border: 1px solid #E2E8F0; border-radius: 8px; margin-bottom: 12px; font-size: 15px; outline: none; transition: border-color 0.2s; background: #F8FAFC; }
        .input-field:focus { border-color: #3B82F6; background: white; }
        .btn-primary { width: 100%; background: #CBD5E1; color: #64748B; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 16px; border: none; cursor: not-allowed; transition: all 0.3s; }
        .btn-primary.active { background: #3B82F6; color: white; cursor: pointer; box-shadow: 0 4px 12px rgba(59,130,246,0.3); }
        .section-title { font-size: 14px; font-weight: bold; color: #475569; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<div class="max-w-md mx-auto p-4 pb-24">
    <div id="map" class="map-container"></div>
    <div class="card">
        <div class="section-title">📍 ΣΗΜΕΙΑ ΔΙΑΔΡΟΜΗΣ & ΠΡΟΪΟΝΤΑ *</div>
        <input type="text" id="start" class="input-field" placeholder="Από (π.χ. Φαρμακείο, Οδός)" onchange="calculateRoute()">
        <input type="text" id="end" class="input-field" placeholder="Προς (Η διεύθυνσή σας)" onchange="calculateRoute()">
        
        <div class="section-title" style="margin-top: 15px; font-size: 12px; color: #ef4444;">🛒 ΑΞΙΑ ΠΡΟΪΟΝΤΩΝ (ΠΡΟΑΙΡΕΤΙΚΟ)</div>
        <input type="number" id="productValue" class="input-field" placeholder="Πόσο κοστίζουν τα πράγματα; (π.χ. 10)" oninput="updateTotalDisplay()" min="0" step="0.1">
    </div>

    <div class="price-box" id="priceBox">
        <div style="font-size: 13px; color: #94A3B8; font-weight: bold; letter-spacing: 1px;">ΚΟΣΤΟΣ ΜΕΤΑΦΟΡΑΣ: <span id="deliveryCostSpan">0.00</span> €</div>
        <div id="productCostDiv" style="font-size: 12px; color: #cbd5e1; margin-top: 5px; display: none;">+ Αξία Προϊόντων: <span id="productCostSpan">0.00</span> €</div>
        <div style="font-size: 32px; font-weight: 800; margin: 5px 0;" id="totalPriceDisplay">0.00 €</div>
        <div style="font-size: 12px; color: #64748B;" id="distanceDisplay">Συμπληρώστε διευθύνσεις</div>
    </div>

    <div class="card">
        <div class="section-title">📦 ΣΤΟΙΧΕΙΑ ΠΑΡΑΛΑΒΗΣ *</div>
        <input type="text" id="pickupName" class="input-field" placeholder="Όνομα καταστήματος ή αποστολέα">
        <input type="tel" id="pickupPhone" class="input-field" placeholder="Τηλέφωνο αποστολέα">
        <div class="flex gap-2">
            <input type="date" id="pickupDate" class="input-field w-1/2">
            <input type="time" id="pickupTime" class="input-field w-1/2">
        </div>
    </div>

    <div class="card">
        <div class="section-title">🏠 ΣΤΟΙΧΕΙΑ ΠΑΡΑΔΟΣΗΣ *</div>
        <input type="text" id="deliveryName" class="input-field" placeholder="Το ονοματεπώνυμό σας">
        <input type="tel" id="deliveryPhone" class="input-field" placeholder="Το κινητό σας τηλέφωνο">
        <div class="flex gap-2">
            <input type="date" id="deliveryDate" class="input-field w-1/2">
            <input type="time" id="deliveryTime" class="input-field w-1/2">
        </div>
        
        <div class="section-title" style="margin-top: 15px;">📝 ΣΧΟΛΙΑ ΠΑΡΑΔΟΣΗΣ *</div>
        <textarea id="deliveryNote" class="input-field" rows="3" placeholder="π.χ. 1ος όροφος, Κουδούνι: Παπαδόπουλος"></textarea>
        
        <div class="section-title" style="margin-top: 15px; color: #ef4444;">💳 ΤΡΟΠΟΣ ΠΛΗΡΩΜΗΣ *</div>
        <select id="paymentMethod" class="input-field" style="font-weight: bold;">
            <option value="" disabled selected>Επιλέξτε τρόπο πληρωμής</option>
            <option value="Μετρητά">💵 Πληρωμή με Μετρητά</option>
            <option value="Online (Viva Wallet)">💳 Πληρωμή Online (Κάρτα / Apple Pay)</option>
        </select>
    </div>

    <button id="sendBtn" class="btn-primary" onclick="submitOrder()">ΣΥΜΠΛΗΡΩΣΤΕ ΔΙΕΥΘΥΝΣΕΙΣ...</button>
</div>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>

<script>
    // 1. FIREBASE SETUP
    const firebaseConfig = {
        apiKey: "AIzaSyDHmXVo-2kFvCFN3Q8U_MvJl_By_b6hs2w",
        authDomain: "fast-delivery-8227d.firebaseapp.com",
        projectId: "fast-delivery-8227d",
        storageBucket: "fast-delivery-8227d.firebasestorage.app",
        messagingSenderId: "751019896171",
        appId: "1:751019896171:web:44530a82b4f016fb1ef02e"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // 2. ΜΕΤΑΒΛΗΤΕΣ ΥΠΟΛΟΓΙΣΜΟΥ
    let calculatedDeliveryPrice = 0;
    let productValue = 0;
    let totalPrice = 0;

    // 3. GOOGLE MAPS SETUP
    let map, directionsService, directionsRenderer;

    function initMap() {
        map = new google.maps.Map(document.getElementById('map'), {
            center: {lat: 37.9429, lng: 23.6439}, // Πειραιάς
            zoom: 13,
            disableDefaultUI: true
        });
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({
            map: map,
            polylineOptions: { strokeColor: "#3B82F6", strokeWeight: 5 }
        });

        new google.maps.places.Autocomplete(document.getElementById('start'));
        new google.maps.places.Autocomplete(document.getElementById('end'));
    }

    function calculateRoute() {
        const start = document.getElementById('start').value;
        const end = document.getElementById('end').value;
        if (!start || !end) return;

        directionsService.route({
            origin: start,
            destination: end,
            travelMode: 'DRIVING'
        }, (response, status) => {
            if (status === 'OK') {
                directionsRenderer.setDirections(response);
                const distanceKm = response.routes[0].legs[0].distance.value / 1000;
                const durationTxt = response.routes[0].legs[0].duration.text;
                
                let basePrice = 3.50; // Ελάχιστη χρέωση 3.50€ μέχρι 3.5 χλμ
                if (distanceKm > 3.5) {
                    basePrice += (distanceKm - 3.5) * 0.90; // +0.90€ για κάθε έξτρα χλμ
                }
                
                calculatedDeliveryPrice = Math.max(3.50, parseFloat(basePrice.toFixed(2)));
                
                document.getElementById('distanceDisplay').innerText = `${distanceKm.toFixed(1)} χλμ απόσταση - ~${durationTxt}`;
                updateTotalDisplay();
                
                const btn = document.getElementById('sendBtn');
                btn.innerText = "ΟΛΟΚΛΗΡΩΣΗ ΠΑΡΑΓΓΕΛΙΑΣ";
                btn.classList.add('active');
                btn.disabled = false;
            }
        });
    }

    function updateTotalDisplay() {
        const prodInput = document.getElementById('productValue').value;
        productValue = parseFloat(prodInput) || 0;
        
        totalPrice = calculatedDeliveryPrice + productValue;
        
        document.getElementById('deliveryCostSpan').innerText = calculatedDeliveryPrice.toFixed(2);
        
        if (productValue > 0) {
            document.getElementById('productCostDiv').style.display = "block";
            document.getElementById('productCostSpan').innerText = productValue.toFixed(2);
        } else {
            document.getElementById('productCostDiv').style.display = "none";
        }
        
        document.getElementById('totalPriceDisplay').innerText = totalPrice.toFixed(2) + ' €';
    }
    function saveOrderToFirebase(payload) {
        const orderData = {
            customerPhone: payload.deliveryPhone,
            date: new Date().toISOString(),
            displayDate: new Date().toLocaleDateString('el-GR') + ' - ' + new Date().toLocaleTimeString('el-GR', {hour: '2-digit', minute:'2-digit'}),
            address: payload.endAddr,
            price: payload.price, 
            status: "Νέα Παραγγελία (Μετρητά)"
        };
        db.collection("orders").add(orderData);
        let history = JSON.parse(localStorage.getItem('orderHistory')) || [];
        history.unshift(orderData);
        localStorage.setItem('orderHistory', JSON.stringify(history));
    }

    // 4. ΑΠΟΣΤΟΛΗ ΠΑΡΑΓΓΕΛΙΑΣ (Το νέο σύστημα)
    const SHIPDAY_URL = "https://script.google.com/macros/s/AKfycbyWoTtkdD_krJ20SutUK0Yp9WlRIuUwFGE3D88lSuG97j_6WP1DqvYbYcMvsL8ZYrLMcg/exec";

    function submitOrder() {
        function checkField(id) {
            const el = document.getElementById(id);
            if (!el.value.trim()) { el.style.borderColor = "red"; return false; }
            el.style.borderColor = "#E2E8F0"; return true;
        }

        let isValid = true;
        if (calculatedDeliveryPrice === 0) { alert("📍 Παρακαλώ επιλέξτε διευθύνσεις διαδρομής!"); return; } 

        isValid = checkField('pickupName') && isValid;
        isValid = checkField('pickupPhone') && isValid;
        isValid = checkField('deliveryName') && isValid;
        isValid = checkField('deliveryPhone') && isValid;
        isValid = checkField('deliveryNote') && isValid;
        
        const paymentEl = document.getElementById('paymentMethod');
        if (!paymentEl.value) { paymentEl.style.borderColor = "red"; isValid = false; } else { paymentEl.style.borderColor = "#E2E8F0"; }

        if (!isValid) { alert("⚠️ Παρακαλώ συμπληρώστε όλα τα υποχρεωτικά πεδία!"); return; }

        const btn = document.getElementById('sendBtn');
        btn.innerText = "Παρακαλώ περιμένετε... ⏳";
        btn.disabled = true;

        const payment = paymentEl.value;
        
        const payload = {
            startAddr: document.getElementById('start').value,
            endAddr: document.getElementById('end').value,
            price: totalPrice.toFixed(2), 
            productValue: productValue,
            deliveryPrice: calculatedDeliveryPrice,
            pickupName: document.getElementById('pickupName').value,
            pickupPhone: document.getElementById('pickupPhone').value,
            pickupDate: document.getElementById('pickupDate').value || '',
            pickupTime: document.getElementById('pickupTime').value || '',
            deliveryName: document.getElementById('deliveryName').value,
            deliveryPhone: document.getElementById('deliveryPhone').value,
            originalNotes: document.getElementById('deliveryNote').value.trim(),
            paymentMethod: payment 
        };

        if (payment === "Online (Viva Wallet)") {
            // Το σωστό link της Viva
            const VIVA_URL = "https://script.google.com/macros/s/AKfycbwv_LVSd-4DCSfQ8h2bB8mlKiJWMyb8NhmC1MDoIMztnpLjb9r4mpqyXbNuGzZQmUDj/exec";
            
            // Αποθηκεύουμε την παραγγελία κρυφά
            localStorage.setItem('pendingOrder', JSON.stringify(payload));
            
            // Ανακατεύθυνση στη Viva Wallet
            const paymentUrl = VIVA_URL + "?amount=" + totalPrice.toFixed(2) + "&name=" + encodeURIComponent(payload.deliveryName) + "&phone=" + encodeURIComponent(payload.deliveryPhone);
            window.location.href = paymentUrl;
        } 
        else {
            // Πληρωμή με Μετρητά
            payload.notes = `[ΚΟΣΤΟΣ ΜΕΤΑΦΟΡΑΣ (Μετρητά): ${calculatedDeliveryPrice.toFixed(2)}€] | ΣΧΟΛΙΑ: ${payload.originalNotes}`;
            
            saveOrderToFirebase(payload);
            fetch(SHIPDAY_URL, { method: 'POST', body: JSON.stringify(payload) })
            .then(() => {
                alert("✅ Η παραγγελία στάλθηκε με επιτυχία στον οδηγό!");
                window.location.reload();
            }).catch(() => {
                alert("✅ Η παραγγελία στάλθηκε!");
                window.location.reload();
            });
        }
    }
</script>

<script async defer src="https://maps.googleapis.com/maps/api/js?key=ΤΟ_ΔΙΚΟ_ΣΟΥ_KΛEΙΔI_API&libraries=places&callback=initMap"></script>

</body>
</html>
